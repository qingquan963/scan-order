services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scanorder
      POSTGRES_USER: scanorder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scanorder123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanorder"]
      interval: 10s
      timeout: 5s

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scanorder:${DB_PASSWORD:-scanorder123}@db:5432/scanorder
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  admin:
    build: ./frontend-admin
    ports:
      - "5174:80"
    depends_on:
      - backend

  customer:
    build: ./frontend-customer
    ports:
      - "5175:80"
    depends_on:
      - backend

  kitchen:
    build: ./frontend-kitchen
    ports:
      - "5176:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - admin
      - customer

volumes:
  pgdata:
